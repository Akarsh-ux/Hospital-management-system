{% extends "base.html" %}
{% block title %}Generate Bill{% endblock %}
{% block page_title %}Generate Invoice{% endblock %}

{% block content %}
<div class="panel" style="max-width:800px">
  <form method="POST" id="billForm">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

    <div class="row g-3">
      <div class="col-12">
        <label class="form-label">Patient *</label>
        <select name="patient_id" class="form-select" required>
          <option value="">Select Patient</option>
          {% for p in patients %}
          <option value="{{ p.id }}">{{ p.name }} ({{ p.mrn }})</option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-6">
        <label class="form-label">Consultation Fee (₹)</label>
        <input type="number" step="0.01" min="0" name="consultation_fee" class="form-control bill-amount" value="0">
      </div>
      <div class="col-md-6">
        <label class="form-label">Medicine Charges (₹)</label>
        <input type="number" step="0.01" min="0" name="medicine_charge" class="form-control bill-amount" value="0">
      </div>
      <div class="col-md-6">
        <label class="form-label">Lab / Diagnostic Charges (₹)</label>
        <input type="number" step="0.01" min="0" name="lab_charge" class="form-control bill-amount" value="0">
      </div>
      <div class="col-md-6">
        <label class="form-label">Room Charges (₹)</label>
        <input type="number" step="0.01" min="0" name="room_charge" class="form-control bill-amount" value="0">
      </div>
      <div class="col-md-4">
        <label class="form-label">Other Charges (₹)</label>
        <input type="number" step="0.01" min="0" name="other_charge" class="form-control bill-amount" value="0">
      </div>
      <div class="col-md-4">
        <label class="form-label">Discount (₹)</label>
        <input type="number" step="0.01" min="0" name="discount" class="form-control bill-amount" value="0">
      </div>
      <div class="col-md-4">
        <label class="form-label">Tax (%)</label>
        <input type="number" step="0.01" min="0" name="tax_percent" class="form-control bill-amount" value="0">
      </div>

      <div class="col-md-6">
        <label class="form-label">Payment Status</label>
        <select name="payment_status" class="form-select">
          <option value="Unpaid">Unpaid</option>
          <option value="Partial">Partial</option>
          <option value="Paid">Paid</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">Payment Method</label>
        <select name="payment_method" class="form-select">
          <option value="">-</option>
          <option>Cash</option>
          <option>Card</option>
          <option>UPI</option>
          <option>Insurance</option>
          <option>Bank Transfer</option>
        </select>
      </div>
    </div>

    <div class="bill-total-box mt-4">
      <span>Estimated Total</span>
      <h2 id="billTotal">₹0.00</h2>
    </div>

    <div class="mt-3 d-flex gap-2">
      <button type="submit" class="btn btn-primary"><i class="bi bi-receipt"></i> Generate Invoice</button>
      <a href="{{ url_for('bills') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function recalcTotal() {
  const fields = ['consultation_fee','medicine_charge','lab_charge','room_charge','other_charge'];
  let subtotal = 0;
  fields.forEach(f => { subtotal += parseFloat(document.querySelector(`[name="${f}"]`).value || 0); });
  const discount = parseFloat(document.querySelector('[name="discount"]').value || 0);
  const taxPercent = parseFloat(document.querySelector('[name="tax_percent"]').value || 0);
  subtotal -= discount;
  const total = subtotal + (subtotal * taxPercent / 100);
  document.getElementById('billTotal').innerText = '₹' + total.toFixed(2);
}
document.querySelectorAll('.bill-amount').forEach(el => el.addEventListener('input', recalcTotal));
</script>
{% endblock %}
