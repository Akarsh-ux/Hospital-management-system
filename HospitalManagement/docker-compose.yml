version: "3.9"

services:
  hospital-app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./hospital.db:/app/hospital.db
      - ./static/uploads:/app/static/uploads
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - HOSPITAL_NAME=${HOSPITAL_NAME:-CareWell Hospital}
    restart: unless-stopped
